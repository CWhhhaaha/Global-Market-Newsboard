<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2E9"/>
      <stop offset="1" stop-color="#EFE6D8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 130) rotate(135) scale(420 340)">
      <stop stop-color="#C65935" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C65935" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 520) rotate(24) scale(360 220)">
      <stop stop-color="#9A2E1A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#9A2E1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3A3028" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 58px 'Avenir Next', 'Segoe UI', sans-serif; fill: #1F252C; letter-spacing: -0.02em; }
      .subtitle { font: 500 26px 'Avenir Next', 'Segoe UI', sans-serif; fill: #5D6470; }
      .kicker { font: 700 15px 'Avenir Next', 'Segoe UI', sans-serif; fill: #B45B43; letter-spacing: 0.12em; }
      .chipText { font: 700 20px 'Avenir Next', 'Segoe UI', sans-serif; fill: #8A351F; }
      .panelTitle { font: 700 24px 'Avenir Next', 'Segoe UI', sans-serif; fill: #1F252C; }
      .panelBody { font: 500 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #616873; }
      .label { font: 700 14px 'Avenir Next', 'Segoe UI', sans-serif; fill: #8A351F; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1280" height="640" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="24" fill="url(#glowA)"/>
  <rect width="1280" height="640" rx="24" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="46" y="42" width="1188" height="556" rx="28" fill="#FBF7F0" fill-opacity="0.9" stroke="#D8CFBE"/>
  </g>

  <text x="84" y="94" class="kicker">RETAIL-FIRST MARKET DESK</text>
  <text x="84" y="164" class="title">Global Market Newsboard</text>
  <text x="84" y="210" class="subtitle">Real-time board for macro, megacaps, geopolitics, and market catalysts</text>

  <g>
    <rect x="84" y="258" width="310" height="62" rx="18" fill="#FFF8EF" stroke="#D8CFBE"/>
    <text x="110" y="297" class="chipText">Fed · Bonds · FX · Metals</text>
  </g>
  <g>
    <rect x="410" y="258" width="310" height="62" rx="18" fill="#FFF8EF" stroke="#D8CFBE"/>
    <text x="433" y="297" class="chipText">Trump · China · Oil · War</text>
  </g>
  <g>
    <rect x="736" y="258" width="432" height="62" rx="18" fill="#FFF8EF" stroke="#D8CFBE"/>
    <text x="760" y="297" class="chipText">NVDA · TSLA · Musk · Jensen Huang</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="364" width="430" height="174" rx="22" fill="#FFF9F1" stroke="#D8CFBE"/>
    <text x="112" y="406" class="panelTitle">Now Moving</text>
    <text x="112" y="442" class="panelBody">Macro, stock, and geopolitical drivers</text>
    <text x="112" y="474" class="panelBody">ranked for fast retail scanning.</text>
    <text x="112" y="514" class="label">LIVE SIGNALS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="536" y="364" width="302" height="174" rx="22" fill="#FFF9F1" stroke="#D8CFBE"/>
    <text x="564" y="406" class="panelTitle">Trader Focus</text>
    <text x="564" y="442" class="panelBody">Trump, Jensen, Musk,</text>
    <text x="564" y="474" class="panelBody">China, earnings, bonds.</text>
    <text x="564" y="514" class="label">WATCH MODULES</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="364" width="308" height="174" rx="22" fill="#FFF9F1" stroke="#D8CFBE"/>
    <text x="888" y="406" class="panelTitle">Search &amp; Replay</text>
    <text x="888" y="442" class="panelBody">History, filters, date ranges,</text>
    <text x="888" y="474" class="panelBody">and a live market tape.</text>
    <text x="888" y="514" class="label">DEPLOYABLE OSS</text>
  </g>
</svg>
